spring:
  data:
    redis:
      host: localhost
      port: 6380
      database: 0
      timeout: 5000ms
  datasource:
    url: jdbc:mysql://localhost:3306/order_system?serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  mybatis-plus:
    configuration:
      map-underscore-to-camel-case: true
  application:
    name: high-concurrency-order
  sql:
    init:
      mode: never
  jpa:
    hibernate:
      ddl-auto: none
jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION}
